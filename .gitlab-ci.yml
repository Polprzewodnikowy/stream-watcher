stages:
  - test
  - deploy

image: node:latest

pages:
  stage: deploy
  script:
    - npm ci
    - npm run build
    - rm -rf public
    - mv build public
    - cp public/index.html public/404.html
  artifacts:
    paths:
      - public
  only:
    - master

test:
  stage: test
  script:
    - npm ci
    - npm run build
  only:
    - merge_requests
